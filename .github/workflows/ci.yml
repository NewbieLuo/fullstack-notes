name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: rm -f pnpm-lock.yaml && pnpm install
        env:
          npm_config_registry: https://registry.npmjs.org/
      - run: pnpm turbo run typecheck test

  build-web:
    name: Build Web
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: rm -f pnpm-lock.yaml && pnpm install
        env:
          npm_config_registry: https://registry.npmjs.org/
      - run: pnpm turbo run build --filter=@fullstack-notes/web
        env:
          NEXT_PUBLIC_API_BASE_URL: https://fullstack-notes-api.vercel.app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy-web:
    name: Deploy Web to GitHub Pages
    needs: build-web
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-api:
    name: Deploy API to Vercel
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: rm -f pnpm-lock.yaml && pnpm install
        env:
          npm_config_registry: https://registry.npmjs.org/
      - run: pnpm --filter @fullstack-notes/api build
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_API }}
          working-directory: ./apps/api/dist
          vercel-args: '--prod'
